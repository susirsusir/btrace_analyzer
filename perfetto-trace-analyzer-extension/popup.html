<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfetto Trace Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    #startBtn {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #4285f4;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #startBtn:hover:not(:disabled) {
      background: #3367d6;
    }

    #startBtn:disabled {
      background: #a0c4ff;
      cursor: not-allowed;
    }

    #progressArea {
      display: none;
      margin-top: 14px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 6px;
    }

    .progress-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #errorArea {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #b91c1c;
      font-size: 13px;
    }

    #completeArea {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      color: #15803d;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Perfetto Trace Analyzer</h1>
    </div>

    <button id="startBtn">开始分析</button>

    <div id="progressArea">
      <div class="progress-step">
        <div class="spinner"></div>
        <span id="progressText"></span>
      </div>
    </div>

    <div id="completeArea" role="status">
      <span id="completeText"></span>
    </div>

    <div id="errorArea" role="alert">
      <span id="errorText"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
